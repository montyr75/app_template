name: app_template
description: "An app template."
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.12.2

dependencies:
  awesome_flutter_extensions: ^2.0.1
  dart_mappable: ^4.8.0
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.3.1
  flutter_smart_dialog: ^5.1.0
  formz: ^0.8.0
  go_router: ^17.2.3
  intl: any
  logging: ^1.3.0
  package_info_plus: ^10.1.0
  recase: ^4.1.0
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  tinycolor2: ^3.0.1
  validators: ^3.0.0

dev_dependencies:
  build_runner: ^2.15.0
  dart_mappable_builder: ^4.8.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
